version: '3.9'

services:

  # База данных
  db:
    image: postgres:16-alpine
    container_name: biology_db
    environment:
      POSTGRES_DB: biology_testing
      POSTGRES_USER: biology_user
      POSTGRES_PASSWORD: biology_pass
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biology_user -d biology_testing"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Backend (FastAPI)
  backend:
    build: ./backend
    container_name: biology_backend
    environment:
      DATABASE_URL: postgresql://biology_user:biology_pass@db:5432/biology_testing
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # Frontend
  frontend:
    build: ./frontend
    container_name: biology_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pg_data:
