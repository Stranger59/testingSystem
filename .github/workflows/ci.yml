name: CI — Build, Push & Integration Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io

jobs:
  # JOB 1: Сборка и публикация Docker-образов
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image prefix
        id: vars
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.REGISTRY }}/${{ steps.vars.outputs.repo }}/backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.REGISTRY }}/${{ steps.vars.outputs.repo }}/frontend:latest

  # JOB 2: Интеграционные тесты (Newman/Postman)
  integration-tests:
    name: Integration Tests (Newman)
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for backend
        run: |
          echo "Waiting for backend to be ready..."
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "✓ Backend is ready (attempt $i)"
              exit 0
            fi
            echo "  Attempt $i/40 — waiting 3s..."
            sleep 3
          done
          echo "✗ Backend did not start in time"
          docker compose logs backend
          exit 1

      - name: Install Newman + HTML reporter
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run Postman collection via Newman
        run: |
          newman run tests/lab4_collection.json \
            --env-var "baseUrl=http://localhost:8000" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export reports/integration-report.html \
            --reporter-htmlextra-title "Biology API — Integration Tests" \
            --color on

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report
          path: reports/integration-report.html

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop services
        if: always()
        run: docker compose down